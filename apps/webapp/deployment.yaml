apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: nginx:1.27-alpine 
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: '32Mi'
            cpu: '10m'
          limits:
            memory: '64Mi'
            cpu: '100m'
